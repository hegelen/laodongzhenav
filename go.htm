<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>劳动者传送门</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f7fb;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal {
            text-align: center;
        }
        .icon {
            font-size: 64px;
            animation: blink 0.8s ease-in-out 2;
        }
        .text {
            margin-top: 16px;
            font-size: 14px;
            color: #5b6e8c;
            animation: fadeInOut 1.2s ease forwards;
        }
        @keyframes blink {
            0% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 6px rgba(59,130,246,0.5); }
            100% { opacity: 0.6; transform: scale(1); }
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            30% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="portal">
    <div class="icon">🚪✨</div>
    <div class="text">劳动者传送门 · 正在安全跳转</div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let encodedParam = urlParams.get('url');

        if (!encodedParam) {
            document.body.innerHTML = '<div style="text-align:center;margin-top:50px;"><h3>无效的跳转链接</h3><p>缺少 url 参数</p></div>';
            return;
        }

        // 归一化：%3D → =
        let base64Str = encodedParam.replace(/%3D/gi, '=');

        function isLikelyBase64(str) {
            return /^[A-Za-z0-9+/=\-_]+$/.test(str);
        }

        function urlSafeToStandardBase64(str) {
            let standard = str.replace(/-/g, '+').replace(/_/g, '/');
            while (standard.length % 4) standard += '=';
            return standard;
        }

        function decodeBase64(base64Str) {
            try {
                let standardBase64 = base64Str;
                if (base64Str.includes('-') || base64Str.includes('_')) {
                    standardBase64 = urlSafeToStandardBase64(base64Str);
                }
                const binary = atob(standardBase64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                return null;
            }
        }

        let finalUrl = null;

        if (isLikelyBase64(encodedParam)) {
            const decoded = decodeBase64(encodedParam);
            if (decoded && (decoded.startsWith('http://') || decoded.startsWith('https://'))) {
                finalUrl = decoded;
            } else if (decoded) {
                finalUrl = decoded;
            }
        }

        if (!finalUrl) {
            finalUrl = encodedParam;
        }

        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            document.body.innerHTML = '<div style="text-align:center;margin-top:50px;"><h3>不支持的链接协议</h3><p>仅允许 http 或 https 链接。</p></div>';
            return;
        }

        // 动画持续约 0.9 秒（两次闪烁 + 文字渐隐），然后跳转
        setTimeout(() => {
            window.location.href = finalUrl;
        }, 900);
    })();
</script>
</body>
</html>
