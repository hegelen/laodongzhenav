<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>.....</title>
</head>
<body>
<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let encodedParam = urlParams.get('url');

        if (!encodedParam) {
            document.body.innerHTML = '<h3>无效的跳转链接</h3><p>请返回重试。</p>';
            return;
        }

        // 归一化：将 %3D 还原为 =
        let base64Str = encodedParam.replace(/%3D/gi, '=');

        // 判断是否像 Base64
        function isLikelyBase64(str) {
            return /^[A-Za-z0-9+/=\-_]+$/.test(str);
        }

        // URL-safe Base64 还原为标准 Base64
        function urlSafeToStandardBase64(str) {
            let standard = str.replace(/-/g, '+').replace(/_/g, '/');
            while (standard.length % 4) standard += '=';
            return standard;
        }

        // 解码 Base64（支持 UTF-8）
        function decodeBase64(base64Str) {
            try {
                let standardBase64 = base64Str;
                if (base64Str.includes('-') || base64Str.includes('_')) {
                    standardBase64 = urlSafeToStandardBase64(base64Str);
                }
                const binary = atob(standardBase64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                return null;
            }
        }

        let finalUrl = null;

        // 如果是 Base64，尝试解码
        if (isLikelyBase64(encodedParam)) {
            const decoded = decodeBase64(encodedParam);
            if (decoded && (decoded.startsWith('http://') || decoded.startsWith('https://'))) {
                finalUrl = decoded;
            } else if (decoded) {
                finalUrl = decoded;
            }
        }

        // 如果解码失败或不是 Base64，直接使用原参数
        if (!finalUrl) {
            finalUrl = encodedParam;
        }

        // 安全校验：只允许 http/https
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            document.body.innerHTML = '<h3>不支持的链接协议</h3><p>仅允许 http 或 https 链接。</p>';
            return;
        }

        // 直接跳转（无延迟、无任何页面显示）
        window.location.href = finalUrl;
    })();
</script>
</body>
</html>
