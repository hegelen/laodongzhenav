<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>跳转中...</title>
</head>
<body>
<script>
    // 获取 URL 参数中的 url 值
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');
    
    if (targetUrl) {
        window.location.href = decodeURIComponent(targetUrl);
    } else {
        document.body.innerHTML = '<h3>无效的跳转链接</h3><p>请返回重试。</p>';
    }
</script>
</body>
</html>
