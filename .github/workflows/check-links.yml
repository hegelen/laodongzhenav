name: 检查死链

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install
        
      - name: 运行死链检查
        run: node check.js
      
      - name: 提交检查报告
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dead_links.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新死链报告 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
