name: 检查死链

on:
  # 每周日凌晨2点运行
  schedule:
    - cron: '0 2 * * 0'
  # 手动触发
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install
        
      - name: 运行死链检查
        run: node check.js
      
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 添加死链报告
          git add -f dead_links.json
          # 如果有改动，就提交
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新死链报告"
          # 拉取远程更新
          git pull --rebase origin master
          # 推送
          git push
