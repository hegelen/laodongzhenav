name: 抓取 RSS 最新文章

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install rss-parser --no-audit --no-fund
      
      - name: 抓取
        run: node fetch-latest-articles.js
      
      - name: 提交更新
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f latest-articles.js
          git commit -m "自动更新文章" || echo "没有新内容需要提交"
          git push origin master --force
