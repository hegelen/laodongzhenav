name: 抓取 RSS 最新文章

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install rss-parser
      
      - name: 抓取文章
        run: node fetch-latest-articles.js
      
      - name: 推送更新
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f latest-articles.js
          git commit -m "更新文章" || true
          git push origin master --force
