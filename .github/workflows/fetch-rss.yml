name: 抓取 RSS 最新文章

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # 改成 60 分钟
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install rss-parser --no-audit --no-fund
      
      - name: 抓取
        id: fetch
        continue-on-error: false
        run: node fetch-latest-articles.js
      
      - name: 提交更新
        if: always()           # 无论抓取是否成功，都执行提交
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f latest-articles.js
          git diff --staged --quiet || git commit -m "自动更新文章"
          git push origin master --force
