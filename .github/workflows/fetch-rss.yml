name: 抓取 RSS 最新文章

on:
  # 每天北京时间凌晨2点运行（UTC 时间18:00）
  schedule:
    - cron: '0 18 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装依赖
        run: npm install rss-parser
        
      - name: 运行抓取脚本
        run: node fetch-latest-articles.js
      
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 添加最新文章
          git add -f latest-articles.js
          # 如果有改动，就提交
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新最新文章"
          # 拉取远程更新
          git pull --rebase origin master
          # 推送
          git push
