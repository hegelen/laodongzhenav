<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>筋斗云·劳动者导航 | 随机博客传送门</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: #020617;
            font-family: 'Segoe UI', 'PingFang SC', 'YouYuan', 'Courier New', monospace;
        }

        /* 全屏容器 */
        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 动态星空背景 (粒子系统) */
        #starsCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: radial-gradient(ellipse at 30% 40%, #0b1120, #030712);
            z-index: 0;
        }

        /* 主内容区 — 置中，半透磨砂 */
        .portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 680px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 88px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 200, 50, 0.2) inset;
            padding: 32px 28px 48px;
            text-align: center;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        /* 动态金箍棒光晕 */
        @keyframes glowPulse {
            0% { text-shadow: 0 0 2px #FFB347, 0 0 4px #FFA500; }
            100% { text-shadow: 0 0 10px #FFD966, 0 0 20px #FF8C00; }
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            animation: glowPulse 1.8s infinite alternate;
            font-family: 'Segoe UI', 'PingFang SC', 'STHeiti', monospace;
        }

        .sub {
            color: #E4C580;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-top: 1px dashed rgba(255, 200, 100, 0.5);
            border-bottom: 1px dashed rgba(255, 200, 100, 0.5);
            display: inline-block;
            padding: 6px 20px;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }

        /* canvas 动画区：孙悟空翻跟斗 */
        .monkey-canvas {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.3);
        }
        canvas#wukongCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
        }

        .target-name {
            font-size: 1.9rem;
            font-weight: 800;
            color: #FFECC7;
            background: linear-gradient(135deg, #FFE5B4, #FFCC80);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px black;
            padding: 8px 12px;
            word-break: break-word;
        }

        .energy-ring {
            margin: 30px auto 16px;
            width: 260px;
            height: 8px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .energy-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD966, #FF8C00, #FF4500);
            border-radius: 20px;
            box-shadow: 0 0 12px #FFA500;
            transition: width 0.04s linear;
        }

        .counter {
            font-family: monospace;
            font-size: 2.2rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            display: inline-block;
            padding: 6px 22px;
            border-radius: 60px;
            color: #FFE0A3;
            letter-spacing: 4px;
            backdrop-filter: blur(8px);
            border: 1px solid #FFD966;
            margin-top: 8px;
        }

        .manual-trigger {
            margin-top: 28px;
            display: inline-block;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #FFBF69;
            border-radius: 60px;
            padding: 10px 28px;
            color: #FFDFA5;
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .manual-trigger:hover {
            background: rgba(255, 180, 60, 0.2);
            border-color: #FFA500;
            color: #FFF0C0;
            box-shadow: 0 0 18px rgba(255, 160, 0, 0.5);
        }

        .footer-tip {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #7A6A4A;
            font-size: 11px;
            z-index: 2;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 14px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 560px) {
            .title { font-size: 2.4rem; letter-spacing: 4px; }
            .target-name { font-size: 1.4rem; }
            .monkey-canvas { width: 130px; height: 130px; }
            .portal { padding: 24px 18px; border-radius: 60px; }
        }
    </style>
</head>
<body>

<div class="fullscreen">
    <canvas id="starsCanvas"></canvas>
</div>

<div class="portal">
    <div class="title">劳动者导航</div>
    <div class="sub">✦ 劳动者博客志 · 一念十万八千博 ✦</div>

    <div class="monkey-canvas">
        <canvas id="wukongCanvas" width="200" height="200"></canvas>
    </div>

    <div class="target-name" id="targetBlogName">—— 锁定坐标 ——</div>

    <div class="energy-ring">
        <div class="energy-fill" id="energyFill"></div>
    </div>
    <div>
        <span class="counter" id="countdownNumber">3</span>
    </div>

    <div>
        <a href="#" id="manualJump" class="manual-trigger">🚀 劳动者紧急腾云 🚀</a>
    </div>
</div>
<div class="footer-tip">☁️ 一个筋斗，十万八千里 ☁️</div>

<script src="data.js"></script>
<script>
    // ------------------------------
    // 1. 动态星空粒子 (全屏酷炫)
    // ------------------------------
    const starCanvas = document.getElementById('starsCanvas');
    const ctxStar = starCanvas.getContext('2d');
    let stars = [];
    function initStars() {
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;
        const starCount = 300;
        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * starCanvas.width,
                y: Math.random() * starCanvas.height,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.7 + 0.3,
                speed: 0.05 + Math.random() * 0.1,
            });
        }
    }
    function drawStars() {
        if (!ctxStar) return;
        ctxStar.clearRect(0, 0, starCanvas.width, starCanvas.height);
        ctxStar.fillStyle = '#FFFFFF';
        for (let s of stars) {
            ctxStar.globalAlpha = s.alpha;
            ctxStar.beginPath();
            ctxStar.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctxStar.fill();
            // 微微闪烁
            s.alpha += (Math.random() - 0.5) * 0.02;
            s.alpha = Math.min(0.9, Math.max(0.2, s.alpha));
        }
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', () => {
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;
        stars = [];
        initStars();
    });
    initStars();
    drawStars();

    // -----------------------------------
    // 2. 孙悟空翻跟斗动画 (Canvas 关键帧：模拟轮廓翻转)
    // -----------------------------------
    const wCanvas = document.getElementById('wukongCanvas');
    const wCtx = wCanvas.getContext('2d');
    let frame = 0;
    const totalFrames = 16;  // 翻跟斗一圈 16帧
    let animationId = null;

    function drawWukong(angleRad) {
        wCtx.clearRect(0, 0, wCanvas.width, wCanvas.height);
        const cx = wCanvas.width / 2;
        const cy = wCanvas.height / 2;
        // 绘制筋斗云光晕
        wCtx.save();
        wCtx.shadowBlur = 12;
        wCtx.shadowColor = "#FFA500";
        // 根据角度旋转整个画布 (翻滚效果)
        wCtx.translate(cx, cy);
        wCtx.rotate(angleRad);
        wCtx.translate(-cx, -cy);
        
        // 画灵动的筋斗云底座 (环形)
        wCtx.beginPath();
        wCtx.ellipse(cx, cy+6, 32, 18, 0, 0, Math.PI*2);
        wCtx.fillStyle = "#FEEBC8";
        wCtx.fill();
        wCtx.shadowBlur = 8;
        wCtx.beginPath();
        wCtx.ellipse(cx-5, cy-4, 16, 14, 0, 0, Math.PI*2);
        wCtx.fillStyle = "#FFF2DF";
        wCtx.fill();
        wCtx.beginPath();
        wCtx.ellipse(cx+8, cy-6, 14, 12, 0, 0, Math.PI*2);
        wCtx.fill();

        // 画孙悟空 (简化版，但能看出猴子特征)
        wCtx.fillStyle = "#E7B347";
        wCtx.beginPath();
        wCtx.ellipse(cx-2, cy-8, 12, 14, 0, 0, Math.PI*2);
        wCtx.fill(); // 头部
        wCtx.fillStyle = "#C88C2A";
        wCtx.beginPath();
        wCtx.ellipse(cx, cy-4, 8, 6, 0, 0, Math.PI*2);
        wCtx.fill(); // 嘴部毛
        
        // 金箍圈
        wCtx.beginPath();
        wCtx.arc(cx-2, cy-14, 5, 0, Math.PI*2);
        wCtx.strokeStyle = "#FFD966";
        wCtx.lineWidth = 2;
        wCtx.stroke();
        
        // 眼睛
        wCtx.fillStyle = "#FFFFFF";
        wCtx.beginPath();
        wCtx.arc(cx-7, cy-12, 2, 0, Math.PI*2);
        wCtx.fill();
        wCtx.beginPath();
        wCtx.arc(cx+3, cy-12, 2, 0, Math.PI*2);
        wCtx.fill();
        wCtx.fillStyle = "#000";
        wCtx.beginPath();
        wCtx.arc(cx-6.5, cy-12, 0.9, 0, Math.PI*2);
        wCtx.fill();
        wCtx.beginPath();
        wCtx.arc(cx+3.5, cy-12, 0.9, 0, Math.PI*2);
        wCtx.fill();
        
        // 身体及红巾
        wCtx.fillStyle = "#D97C15";
        wCtx.fillRect(cx-8, cy-2, 16, 18);
        wCtx.fillStyle = "#E34234";
        wCtx.fillRect(cx-5, cy+8, 10, 5);
        wCtx.restore();
        
        // 额外加一个旋转的光圈 (就是筋斗云特效)
        wCtx.save();
        wCtx.shadowBlur = 8;
        wCtx.beginPath();
        wCtx.ellipse(cx, cy+2, 42, 26, angleRad*0.5, 0, Math.PI*2);
        wCtx.fillStyle = "rgba(255, 180, 40, 0.2)";
        wCtx.fill();
        wCtx.restore();
    }

    function animateFlip() {
        if (animationId) cancelAnimationFrame(animationId);
        let start = null;
        const duration = 600;  // 完整翻跟斗周期 0.6秒
        function step(timestamp) {
            if (!start) start = timestamp;
            const elapsed = timestamp - start;
            const progress = Math.min(1, elapsed / duration);
            const angle = progress * Math.PI * 2;  // 完整一圈
            drawWukong(angle);
            if (progress < 1) {
                animationId = requestAnimationFrame(step);
            } else {
                // 重置角度，继续下一次循环
                animateFlip();
            }
        }
        animationId = requestAnimationFrame(step);
    }
    animateFlip(); // 一直翻跟斗，永不停歇！

    // ------------------------------
    // 3. 随机跳转逻辑 (全屏跃迁)
    // ------------------------------
    function getRealUrl(blogUrl) {
        if (!blogUrl) return '';
        if (blogUrl.startsWith('http://') || blogUrl.startsWith('https://')) return blogUrl;
        if (blogUrl.startsWith('/go.htm?url=')) {
            let real = blogUrl.replace('/go.htm?url=', '');
            try { real = decodeURIComponent(real); } catch(e) {}
            return real;
        }
        return blogUrl;
    }
    
    let targetUrl = '';
    let targetName = '';
    let countdownInterval = null;
    let energyInterval = null;
    let jumpScheduled = false;
    
    const energyFill = document.getElementById('energyFill');
    const countdownSpan = document.getElementById('countdownNumber');
    const targetSpan = document.getElementById('targetBlogName');
    const manualBtn = document.getElementById('manualJump');
    
    function startJumpTimer(destinationUrl) {
        if (countdownInterval) clearInterval(countdownInterval);
        if (energyInterval) clearInterval(energyInterval);
        let remaining = 3;   // 倒计时3秒
        countdownSpan.innerText = remaining;
        let startTime = performance.now();
        const totalDuration = 3000; // 3秒充能
        
        function updateEnergy() {
            let elapsed = performance.now() - startTime;
            let percent = Math.min(1, elapsed / totalDuration);
            energyFill.style.width = (percent * 100) + '%';
            let newCount = Math.max(0, 3 - Math.floor(elapsed / 1000));
            if (newCount !== parseInt(countdownSpan.innerText)) {
                countdownSpan.innerText = newCount;
                // 倒计时1时给个闪烁
                if (newCount === 1) {
                    document.body.style.backgroundColor = "#FFE4B5";
                    setTimeout(() => document.body.style.backgroundColor = "", 200);
                }
            }
            if (percent >= 1.0) {
                clearInterval(energyInterval);
                clearInterval(countdownInterval);
                if (!jumpScheduled) {
                    jumpScheduled = true;
                    // 加个视觉闪光
                    const flash = document.createElement('div');
                    flash.style.position = 'fixed'; flash.style.top=0; flash.style.left=0; flash.style.width='100%'; flash.style.height='100%';
                    flash.style.backgroundColor = '#FFF8E7'; flash.style.opacity = '0.7'; flash.style.pointerEvents = 'none'; flash.style.zIndex = '9999';
                    document.body.appendChild(flash);
                    setTimeout(() => { window.location.href = destinationUrl; }, 150);
                }
            }
        }
        energyInterval = setInterval(updateEnergy, 30);
        // 同时每200ms刷新一次显示, 但updateEnergy已包含
        updateEnergy();
    }
    
    function selectRandomBlog() {
        if (typeof allBlogs === 'undefined' || !allBlogs.length) {
            targetSpan.innerText = '❌ 筋斗云迷失时空';
            return false;
        }
        const randomIndex = Math.floor(Math.random() * allBlogs.length);
        const blog = allBlogs[randomIndex];
        targetName = blog.name || '无名仙栈';
        targetUrl = getRealUrl(blog.url);
        targetSpan.innerText = targetName;
        return true;
    }
    
    function initJump() {
        if (!selectRandomBlog()) return;
        jumpScheduled = false;
        if (countdownInterval) clearInterval(countdownInterval);
        if (energyInterval) clearInterval(energyInterval);
        energyFill.style.width = '0%';
        countdownSpan.innerText = '3';
        startJumpTimer(targetUrl);
        
        // 紧急手动跳转
        manualBtn.onclick = (e) => {
            e.preventDefault();
            if (countdownInterval) clearInterval(countdownInterval);
            if (energyInterval) clearInterval(energyInterval);
            // 直接跃迁
            window.location.href = targetUrl;
        };
    }
    
    // 当 data.js 准备好后启动
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initJump);
    } else {
        initJump();
    }
</script>
</body>
</html>
