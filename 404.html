<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>劳动者导航·页面未找到 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #fef5e7, #f0e1c0);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Noto Sans', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 248, 235, 0.92);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
            padding: 36px 28px 48px;
            text-align: center;
            border: 1px solid rgba(200, 60, 30, 0.3);
            transition: all 0.2s;
        }
        /* 工农兵插画主体 (矢量风格) */
        .hero-illustration {
            margin: 0 auto 24px;
            max-width: 280px;
            width: 80%;
        }
        .hero-illustration svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.1));
        }
        h1 {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #B22234, #CD5C5C, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }
        .sub {
            font-size: 1.3rem;
            font-weight: 500;
            color: #9b4b2e;
            border-bottom: 2px solid #e6c8a0;
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 24px;
        }
        .message {
            color: #3e2a21;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 28px;
            background: #fff3e0;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 24px 0 20px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #872e1e;
            border: none;
            padding: 12px 28px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #872e1e;
            color: #872e1e;
        }
        .btn-outline:hover {
            background: #872e1e;
            color: white;
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #b14224;
            box-shadow: 0 4px 12px rgba(180, 60, 30, 0.4);
        }
        .btn-primary:hover {
            background: #932b12;
            transform: translateY(-2px);
        }
        .footer-quote {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #b0845c;
            border-top: 1px dashed #e9cfaa;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }
        .footer-quote span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        @media (max-width: 540px) {
            .card { padding: 28px 20px; border-radius: 40px; }
            h1 { font-size: 3rem; letter-spacing: 2px; }
            .sub { font-size: 1rem; }
            .buttons { gap: 12px; }
            .btn { padding: 8px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
