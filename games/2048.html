        /* ---------- 灰色平面主题 · 优化对比度，按钮更鲜明 ---------- */
        * {

            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;

        body {

            font-family: "Clear Sans", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo-area {
            line-height: 0;
        }
        .game-logo {
            display: block;
            height: 64px;
            width: auto;
            object-fit: contain;
        }
        /* logo 失败后备 - 深灰文字 */
        .game-logo-error {
            font-size: 40px;
            font-weight: 800;
            color: #3b4b54;
            line-height: 1;
        }

        /* 分数面板 - 质感深灰 */
        .score-panel {
            display: flex;
            gap: 12px;
        }

        .score-card {
            background: #6e7b8c;      /* 带蓝调的深灰，清晰可辨 */
            border-radius: 6px;
            padding: 8px 18px;
            text-align: center;
            min-width: 85px;
        }

        .score-label {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: #edeff2;
            letter-spacing: 1px;
        }

        .score-number {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        /* 加分飘字 - 深色 */
        .score-pop {
            position: absolute;
            right: 15px;
            top: 30px;
            font-size: 22px;
            font-weight: bold;
            color: #3b4b54;
            pointer-events: none;
            animation: floatUp 0.5s ease-out forwards;
            z-index: 200;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-40px);
            }
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }

        .game-desc {
            font-size: 15px;
            color: #4a5a64;
            font-weight: 500;
        }

        /* 按钮 ———— 加深，与背景明显区分 */
        .new-game-btn {

            border-radius: 8px;
            padding: 8px 28px;

            font-weight: bold;
            color: #f9fafc;
            cursor: pointer;
            transition: background 0.1s;
            box-shadow: none;
        }

        .new-game-btn:active {

        }

        /* 游戏区域 - 浅灰棋盘底色 */
        .game-board {
            position: relative;
            background: #bac8d1;      /* 更明亮的灰，与网格形成柔和对比 */

        /* 网格背景 - 半透珍珠白 */
        .grid-background {
            position: absolute;
            top: 12px;

            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid-row {
            display: flex;
            gap: 12px;
            flex: 1;

        .grid-cell {
            background: rgba(245, 248, 250, 0.5);
            border-radius: 8px;
            flex: 1;
        }

        /* 瓦片容器 */
        .tiles-layer {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 10;
        }

        /* 瓦片本身 - 无任何立体感 */
        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border-radius: 8px;
            transition: transform 0.08s linear, left 0.08s linear, top 0.08s linear;
            will-change: transform, left, top;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 48px;
            font-weight: 800;
        }

        /* 灰阶渐进色板，高级且清爽 */
        .tile-2 .tile-inner { background: #eef2f5; color: #3b4b54; }
        .tile-4 .tile-inner { background: #e0e6ec; color: #3b4b54; }
        .tile-8 .tile-inner { background: #cbd6df; color: #ffffff; }
        .tile-16 .tile-inner { background: #b3c2cd; color: #ffffff; }
        .tile-32 .tile-inner { background: #9aadb8; color: #ffffff; }
        .tile-64 .tile-inner { background: #8298a6; color: #ffffff; }
        .tile-128 .tile-inner { background: #6e8494; color: #ffffff; font-size: 42px; }
        .tile-256 .tile-inner { background: #5e7282; color: #ffffff; font-size: 42px; }
        .tile-512 .tile-inner { background: #4e6272; color: #ffffff; font-size: 42px; }
        .tile-1024 .tile-inner { background: #405464; color: #ffffff; font-size: 34px; }
        .tile-2048 .tile-inner { background: #334655; color: #ffffff; font-size: 34px; }
        .tile-super .tile-inner { background: #25353f; color: #ffffff; font-size: 28px; }

        /* 出现动画 */
        @keyframes tileAppear {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tile-new .tile-inner {
            animation: tileAppear 0.12s ease-out forwards;
        }

        /* 合并动画 */
        @keyframes tileMerge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-merged .tile-inner {
            animation: tileMerge 0.12s ease-out forwards;
        }

        /* 游戏蒙层 - 半透明灰白，易读 */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(235, 240, 245, 0.94);
            border-radius: 10px;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .game-overlay.show {
            display: flex;
        }

        .overlay-text {
            font-size: 48px;
            font-weight: 800;
            color: #4a606e;
            text-align: center;
        }

        .overlay-buttons {
            display: flex;
            gap: 20px;
        }

        /* 浮层按钮同样保持深色高对比 */
        .overlay-btn {
            background: #6e7f8c;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
        }

        .overlay-btn:active {
            background: #536572;
        }

        /* 响应式 */
        @media (max-width: 520px) {
            .game-wrapper {
                max-width: 100%;
            }
            .game-logo {
                height: 44px;
            }
            .score-card {
                padding: 6px 12px;
                min-width: 65px;
            }
            .score-number {
                font-size: 22px;
            }
            .score-label {
                font-size: 11px;
            }
            .game-board {
                padding: 8px;
            }
            .grid-background {
                top: 8px;
                left: 8px;
                right: 8px;
                bottom: 8px;
                gap: 8px;
            }
            .grid-row {
                gap: 8px;
            }
            .tiles-layer {
                top: 8px;
                left: 8px;
                right: 8px;
                bottom: 8px;
            }
            .tile-inner {
                font-size: 32px;
            }
            .tile-128 .tile-inner, .tile-256 .tile-inner, .tile-512 .tile-inner {
                font-size: 28px;
            }
            .tile-1024 .tile-inner, .tile-2048 .tile-inner {
                font-size: 22px;
            }
            .tile-super .tile-inner {
                font-size: 20px;
            }
            .overlay-text {
                font-size: 34px;
            }
            .overlay-btn {
                padding: 8px 20px;
                font-size: 16px;
            }
            .game-desc {
                font-size: 12px;
            }
            .new-game-btn {
                padding: 6px 20px;
                font-size: 16px;
            }
        }

        button {
            outline: none;
        }
    </style>

        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        const resetBtn = document.getElementById('resetGameBtn');
        const gameBoardDiv = document.getElementById('gameBoard');
        const tilesLayer = document.getElementById('tilesLayer');
        const gridBg = document.getElementById('gridBg');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayMsgSpan = document.getElementById('overlayMsg');
        const overlayResetBtn = document.getElementById('overlayResetBtn');
        const overlayContinueBtn = document.getElementById('overlayContinueBtn');

        let newTilePos = null;

        // 最高分
        function loadBest() {
            const saved = localStorage.getItem('2048_best_gray_contrast');
            if(saved && !isNaN(parseInt(saved))) {
                bestScore = parseInt(saved);
            } else {
                bestScore = 0;
            }
            bestSpan.innerText = bestScore;
        }

        function saveBest() {
            if(currentScore > bestScore) {
                bestScore = currentScore;
                bestSpan.innerText = bestScore;
                localStorage.setItem('2048_best_gray_contrast', bestScore);
            }
        }

        function updateScoreUI() {
            scoreSpan.innerText = currentScore;
            if(currentScore > bestScore) saveBest();
        }

        function showScorePop(points) {
            if(points === 0) return;
            const scoreCard = document.querySelector('.score-card');
            const popDiv = document.createElement('div');
            popDiv.className = 'score-pop';
            popDiv.innerText = `+${points}`;
            scoreCard.style.position = 'relative';
            popDiv.style.position = 'absolute';
            popDiv.style.right = '10px';
            popDiv.style.top = '0px';
            scoreCard.appendChild(popDiv);
            setTimeout(() => {
                if(popDiv && popDiv.remove) popDiv.remove();
                scoreCard.style.position = '';
            }, 500);
        }

        function initGame() {
            for(let i = 0; i < SIZE; i++) {
                for(let j = 0; j < SIZE; j++) board[i][j] = 0;
            }
            currentScore = 0;
            hasWon = false;
            isGameOverFlag = false;
            keepPlayingAfterWin = false;
            updateScoreUI();
            addRandomTile();
            addRandomTile();
            gameOverlay.classList.remove('show');
            renderBoard();
        }

        function addRandomTile() {
            const empty = [];
            for(let i=0; i<SIZE; i++) {
                for(let j=0; j<SIZE; j++) {
                    if(board[i][j] === 0) empty.push([i, j]);
                }
            }
            if(empty.length === 0) return false;
            const [row, col] = empty[Math.floor(Math.random() * empty.length)];
            const value = Math.random() < 0.9 ? 2 : 4;
            board[row][col] = value;
            newTilePos = { row, col };
            return true;
        }

        // 方向: 0上 1右 2下 3左
        function moveAndMerge(direction) {
            if(isGameOverFlag) return false;
            let totalGain = 0;
            let hasMoved = false;

            if(direction === 0) { // 上
                for(let col = 0; col < SIZE; col++) {
                    let column = [board[0][col], board[1][col], board[2][col], board[3][col]];
                    let { newCol, gain } = mergeLine(column);
                    totalGain += gain;
                    for(let row = 0; row < SIZE; row++) {
                        if(board[row][col] !== newCol[row]) hasMoved = true;
                        board[row][col] = newCol[row];
                    }
                }
            } 
            else if(direction === 2) { // 下
                for(let col = 0; col < SIZE; col++) {
                    let column = [board[3][col], board[2][col], board[1][col], board[0][col]];
                    let { newCol, gain } = mergeLine(column);
                    totalGain += gain;
                    let reversed = [...newCol].reverse();
                    for(let row = 0; row < SIZE; row++) {
                        if(board[row][col] !== reversed[row]) hasMoved = true;
                        board[row][col] = reversed[row];
                    }
                }
            }
            else if(direction === 1) { // 右
                for(let row = 0; row < SIZE; row++) {
                    let line = [board[row][3], board[row][2], board[row][1], board[row][0]];
                    let { newCol, gain } = mergeLine(line);
                    totalGain += gain;
                    let reversed = [...newCol].reverse();
                    for(let col = 0; col < SIZE; col++) {
                        if(board[row][col] !== reversed[col]) hasMoved = true;
                        board[row][col] = reversed[col];
                    }
                }
            }
            else if(direction === 3) { // 左
                for(let row = 0; row < SIZE; row++) {
                    let line = [board[row][0], board[row][1], board[row][2], board[row][3]];
                    let { newCol, gain } = mergeLine(line);
                    totalGain += gain;
                    for(let col = 0; col < SIZE; col++) {
                        if(board[row][col] !== newCol[col]) hasMoved = true;
                        board[row][col] = newCol[col];
                    }
                }
            }

            if(hasMoved) {
                if(totalGain > 0) {
                    currentScore += totalGain;
                    updateScoreUI();
                    showScorePop(totalGain);
                }
                addRandomTile();
                renderBoard();
                
                if(!hasWon && !keepPlayingAfterWin) {
                    if(checkWinCondition()) {
                        hasWon = true;
                        showGameOverlay('win');
                        return true;
                    }
                }
                
                if(isGameReallyOver()) {
                    isGameOverFlag = true;
                    showGameOverlay('over');
                }
                return true;
            }
            return false;
        }

        function mergeLine(arr) {
            let filtered = arr.filter(v => v !== 0);
            let newArr = [];
            let gain = 0;
            for(let i=0; i<filtered.length; i++) {
                if(i+1 < filtered.length && filtered[i] === filtered[i+1]) {
                    let merged = filtered[i] * 2;
                    newArr.push(merged);
                    gain += merged;
                    i++;
                } else {
                    newArr.push(filtered[i]);
                }
            }
            while(newArr.length < SIZE) newArr.push(0);
            return { newCol: newArr, gain };
        }

        function checkWinCondition() {
            for(let i=0; i<SIZE; i++) {
                for(let j=0; j<SIZE; j++) {
                    if(board[i][j] >= 2048) return true;
                }
            }
            return false;
        }

        function isGameReallyOver() {
            for(let i=0; i<SIZE; i++) {
                for(let j=0; j<SIZE; j++) if(board[i][j] === 0) return false;
            }
            for(let i=0; i<SIZE; i++) {
                for(let j=0; j<SIZE; j++) {
                    let val = board[i][j];
                    if(j+1 < SIZE && board[i][j+1] === val) return false;
                    if(i+1 < SIZE && board[i+1][j] === val) return false;
                }
            }
            return true;
        }

        function showGameOverlay(type) {
            if(type === 'win') {
                overlayMsgSpan.innerText = 'You win!';
                overlayContinueBtn.style.display = 'inline-block';
                gameOverlay.classList.add('show');
            } else if(type === 'over') {
                overlayMsgSpan.innerText = 'Game over!';
                overlayContinueBtn.style.display = 'none';
                gameOverlay.classList.add('show');
            }
        }

        function hideOverlay() { gameOverlay.classList.remove('show'); }

        function continueGame() {
            keepPlayingAfterWin = true;
            hasWon = false;
            hideOverlay();
            renderBoard();
        }

        function resetGame() {
            for(let i=0; i<SIZE; i++) for(let j=0; j<SIZE; j++) board[i][j] = 0;
            currentScore = 0;
            hasWon = false;
            isGameOverFlag = false;
            keepPlayingAfterWin = false;
            updateScoreUI();
            addRandomTile();
            addRandomTile();
            hideOverlay();
            renderBoard();
        }

        // 渲染瓦片 - 动态计算精确位置
        function renderBoard() {
            tilesLayer.innerHTML = '';
            const boardRect = gameBoardDiv.getBoundingClientRect();
            const boardWidth = boardRect.width;
            const padding = window.innerWidth <= 520 ? 8 : 12;
            const innerSize = boardWidth - padding * 2;
            const gap = window.innerWidth <= 520 ? 8 : 12;
            const cellSize = (innerSize - gap * (SIZE - 1)) / SIZE;
            
            for(let i=0; i<SIZE; i++) {
                for(let j=0; j<SIZE; j++) {
                    const val = board[i][j];
                    if(val !== 0) {
                        const tileDiv = document.createElement('div');
                        tileDiv.className = 'tile';
                        const innerDiv = document.createElement('div');
                        innerDiv.className = 'tile-inner';
                        innerDiv.innerText = val;
                        tileDiv.appendChild(innerDiv);
                        
                        let tileType = val >= 2048 ? 'tile-super' : `tile-${val}`;
                        tileDiv.classList.add(tileType);
                        
                        const left = j * (cellSize + gap);
                        const top = i * (cellSize + gap);
                        tileDiv.style.width = `${cellSize}px`;
                        tileDiv.style.height = `${cellSize}px`;
                        tileDiv.style.left = `${left}px`;
                        tileDiv.style.top = `${top}px`;
                        
                        if(newTilePos && newTilePos.row === i && newTilePos.col === j) {
                            tileDiv.classList.add('tile-new');
                            setTimeout(() => tileDiv.classList.remove('tile-new'), 200);
                        }
                        tilesLayer.appendChild(tileDiv);
                    }
                }
            }
            newTilePos = null;
        }

        function buildGridBackground() {
            gridBg.innerHTML = '';
            const gap = window.innerWidth <= 520 ? 8 : 12;
            for(let i=0; i<SIZE; i++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                rowDiv.style.gap = `${gap}px`;
                for(let j=0; j<SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    rowDiv.appendChild(cell);
                }
                gridBg.appendChild(rowDiv);
            }
        }

        let resizeTimer;
        function onResize() {
            if(resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                buildGridBackground();
                renderBoard();
            }, 100);
        }

        function onKeyDown(e) {
            const key = e.key;
            let dir = -1;
            if(key === 'ArrowUp') dir = 0;
            else if(key === 'ArrowRight') dir = 1;
            else if(key === 'ArrowDown') dir = 2;
            else if(key === 'ArrowLeft') dir = 3;
            else return;
            e.preventDefault();
            if(dir !== -1) {
                moveAndMerge(dir);
                if(isGameReallyOver() && !hasWon && !isGameOverFlag) {
                    isGameOverFlag = true;
                    showGameOverlay('over');
                }
            }
        }

        let touchStartPos = null;
        function onTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartPos = { x: touch.clientX, y: touch.clientY };
        }
        
        function onTouchEnd(e) {
            if(!touchStartPos) return;
            e.preventDefault();
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const dx = endX - touchStartPos.x;
            const dy = endY - touchStartPos.y;
            if(Math.abs(dx) < 15 && Math.abs(dy) < 15) {
                touchStartPos = null;
                return;
            }
            let dir = -1;
            if(Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 1 : 3;
            else dir = dy > 0 ? 2 : 0;
            if(dir !== -1) {
                moveAndMerge(dir);
                if(isGameReallyOver() && !hasWon && !isGameOverFlag) {
                    isGameOverFlag = true;
                    showGameOverlay('over');
                }
            }
            touchStartPos = null;
        }
        
        window.addEventListener('resize', onResize);
        document.addEventListener('keydown', onKeyDown);
        const boardEl = document.getElementById('gameBoard');
        boardEl.addEventListener('touchstart', onTouchStart, { passive: false });
        boardEl.addEventListener('touchend', onTouchEnd);
        resetBtn.addEventListener('click', () => resetGame());
        overlayResetBtn.addEventListener('click', () => resetGame());
        overlayContinueBtn.addEventListener('click', () => continueGame());

        function start() {
            loadBest();
            buildGridBackground();
            initGame();
        }
        start();
    })();
</script>
