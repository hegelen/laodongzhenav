<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 - 劳动者休闲游戏</title>
    <style>
        /* ========== 2048 游戏核心样式 ========== */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background: #e2e6ea;
            font-family: "Clear Sans", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            flex-direction: column;
        }

        .game-wrapper {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo-area {
            line-height: 0;
        }
        .game-logo {
            display: block;
            height: 64px;
            width: auto;
            object-fit: contain;
        }
        .game-logo-error {
            font-size: 40px;
            font-weight: 800;
            color: #3b4b54;
            line-height: 1;
            display: none;
        }

        .score-panel {
            display: flex;
            gap: 12px;
        }

        .score-card {
            background: #6e7b8c;
            border-radius: 6px;
            padding: 8px 18px;
            text-align: center;
            min-width: 85px;
            position: relative;
        }

        .score-label {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: #edeff2;
            letter-spacing: 1px;
        }

        .score-number {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        .score-pop {
            position: absolute;
            right: 15px;
            top: 30px;
            font-size: 22px;
            font-weight: bold;
            color: #3b4b54;
            pointer-events: none;
            animation: floatUp 0.5s ease-out forwards;
            z-index: 200;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
        }

        .game-desc {
            font-size: 15px;
            color: #4a5a64;
            font-weight: 500;
        }

        .new-game-btn {
            background: #5a6e7c;
            border: none;
            border-radius: 8px;
            padding: 8px 28px;
            font-size: 18px;
            font-weight: bold;
            color: #f9fafc;
            cursor: pointer;
        }
        .new-game-btn:active { background: #3f525f; }

        .game-board {
            position: relative;
            background: #bac8d1;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }

        .grid-background {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .grid-row {
            display: flex;
            gap: 12px;
            flex: 1;
        }
        .grid-cell {
            background: rgba(245, 248, 250, 0.5);
            border-radius: 8px;
            flex: 1;
        }

        .tiles-layer {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 10;
        }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border-radius: 8px;
            transition: transform 0.08s linear, left 0.08s linear, top 0.08s linear;
            will-change: transform, left, top;
        }
        .tile-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 48px;
            font-weight: 800;
        }

        .tile-2 .tile-inner { background: #eef2f5; color: #3b4b54; }
        .tile-4 .tile-inner { background: #e0e6ec; color: #3b4b54; }
        .tile-8 .tile-inner { background: #cbd6df; color: #fff; }
        .tile-16 .tile-inner { background: #b3c2cd; color: #fff; }
        .tile-32 .tile-inner { background: #9aadb8; color: #fff; }
        .tile-64 .tile-inner { background: #8298a6; color: #fff; }
        .tile-128 .tile-inner { background: #6e8494; color: #fff; font-size: 42px; }
        .tile-256 .tile-inner { background: #5e7282; color: #fff; font-size: 42px; }
        .tile-512 .tile-inner { background: #4e6272; color: #fff; font-size: 42px; }
        .tile-1024 .tile-inner { background: #405464; color: #fff; font-size: 34px; }
        .tile-2048 .tile-inner { background: #334655; color: #fff; font-size: 34px; }
        .tile-super .tile-inner { background: #25353f; color: #fff; font-size: 28px; }

        @keyframes tileAppear {
            0% { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }
        .tile-new .tile-inner { animation: tileAppear 0.12s ease-out forwards; }

        @keyframes tileMerge {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .tile-merged .tile-inner { animation: tileMerge 0.12s ease-out forwards; }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(235, 240, 245, 0.94);
            border-radius: 10px;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .game-overlay.show { display: flex; }
        .overlay-text { font-size: 48px; font-weight: 800; color: #4a606e; text-align: center; }
        .overlay-buttons { display: flex; gap: 20px; }
        .overlay-btn {
            background: #6e7f8c;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
        }
        .overlay-btn:active { background: #536572; }

        @media (max-width: 520px) {
            .game-wrapper { max-width: 100%; }
            .game-logo { height: 44px; }
            .score-card { padding: 6px 12px; min-width: 65px; }
            .score-number { font-size: 22px; }
            .game-board { padding: 8px; }
            .grid-background { top: 8px; left: 8px; right: 8px; bottom: 8px; gap: 8px; }
            .grid-row { gap: 8px; }
            .tiles-layer { top: 8px; left: 8px; right: 8px; bottom: 8px; }
            .tile-inner { font-size: 32px; }
            .tile-128 .tile-inner, .tile-256 .tile-inner, .tile-512 .tile-inner { font-size: 28px; }
            .tile-1024 .tile-inner, .tile-2048 .tile-inner { font-size: 22px; }
        }
        
        /* 底部信息栏样式 */
        .footer-info {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #6c7a89;
        }
        .footer-info a {
            color: inherit;
            text-decoration: none;
        }
        .footer-info .link {
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            vertical-align: middle;
        }
        
        /* 关于本站抽屉 */
        #about-drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        #about-drawer-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .about-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            max-height: 80vh;
            overflow-y: auto;
        }
        .about-drawer.show {
            transform: translateY(0);
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px 10px 20px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            font-size: 18px;
        }
        .drawer-close {
            cursor: pointer;
            padding: 4px;
        }
        .drawer-content {
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="logo-area">
            <img class="game-logo" src="logo.png" alt="2048" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="game-logo-error">2048</div>
        </div>
        <div class="score-panel">
            <div class="score-card"><div class="score-label">SCORE</div><div class="score-number" id="scoreValue">0</div></div>
            <div class="score-card"><div class="score-label">BEST</div><div class="score-number" id="bestValue">0</div></div>
        </div>
    </div>
    <div class="action-bar">
        <div class="game-desc">← ↑ → ↓ 滑动屏幕</div>
        <button class="new-game-btn" id="resetGameBtn">新游戏</button>
    </div>
    <div class="game-board" id="gameBoard">
        <div class="grid-background" id="gridBg"></div>
        <div class="tiles-layer" id="tilesLayer"></div>
        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-text" id="overlayMsg">Game Over</div>
            <div class="overlay-buttons">
                <button class="overlay-btn" id="overlayResetBtn">重来</button>
                <button class="overlay-btn" id="overlayContinueBtn" style="display: none;">继续</button>
            </div>
        </div>
    </div>
</div>

<!-- 底部信息栏：只保留运营方和关于本站 -->
<div class="footer-info">
    2026 laodongzhe.cn 运营方:<a href="https://laodongzhe.cn" target="_blank">劳动者导航</a>.  
    <span class="link" onclick="toggleAboutDrawer()">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        关于本站
    </span>
</div>

<!-- 关于本站抽屉 -->
<div id="about-drawer-overlay" onclick="toggleAboutDrawer()"></div>
<div id="about-drawer" class="about-drawer">
    <div class="drawer-header">
        <span class="drawer-title">关于本站</span>
        <div class="drawer-close" onclick="toggleAboutDrawer()">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
    </div>
    <div class="drawer-content">
        <p>laodongzhe.cn <strong>益智休闲</strong>小游戏。</p>
        <p>我们致力于为劳动者提供纯净的益智休闲游戏。</p>
        <p>游戏源码基于 <a href="https://2.048.org" target="_blank" style="color: inherit;">2.048.org</a>。</p>
        <p>本小游戏内置在 <a href="https://laodongzhe.cn" target="_blank" style="color: inherit;">劳动者导航</a>，欢迎体验。</p>
        <p style="margin-top: 20px; font-size: 13px;">当前版本: v1.0.1 <span onclick="alert('可前往 www.laodongzhe.cn 提交意见')" style="cursor: pointer; text-decoration: underline; margin-left: 12px;">反馈意见</span></p>
    </div>
</div>

<script>
    // ------------------ 2048 核心逻辑 ------------------
    (function(){
        const SIZE = 4;
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let currentScore = 0;
        let bestScore = 0;
        let hasWon = false;
        let isGameOverFlag = false;
        let keepPlayingAfterWin = false;

        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        const resetBtn = document.getElementById('resetGameBtn');
        const gameBoardDiv = document.getElementById('gameBoard');
        const tilesLayer = document.getElementById('tilesLayer');
        const gridBg = document.getElementById('gridBg');
        const gameOverlay = document.getElementById('gameOverlay');
        const overlayMsgSpan = document.getElementById('overlayMsg');
        const overlayResetBtn = document.getElementById('overlayResetBtn');
        const overlayContinueBtn = document.getElementById('overlayContinueBtn');

        let newTilePos = null;

        function loadBest() {
            const saved = localStorage.getItem('2048_best_gray');
            bestScore = saved && !isNaN(parseInt(saved)) ? parseInt(saved) : 0;
            bestSpan.innerText = bestScore;
        }
        function saveBest() {
            if(currentScore > bestScore) {
                bestScore = currentScore;
                bestSpan.innerText = bestScore;
                localStorage.setItem('2048_best_gray', bestScore);
            }
        }
        function updateScoreUI() {
            scoreSpan.innerText = currentScore;
            if(currentScore > bestScore) saveBest();
        }
        function showScorePop(points) {
            if(points === 0) return;
            const card = document.querySelector('.score-card');
            const pop = document.createElement('div');
            pop.className = 'score-pop';
            pop.innerText = `+${points}`;
            card.appendChild(pop);
            setTimeout(() => pop.remove(), 500);
        }
        function addRandomTile() {
            const empty = [];
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++) if(board[i][j]===0) empty.push([i,j]);
            if(empty.length===0) return false;
            const [row,col] = empty[Math.floor(Math.random()*empty.length)];
            board[row][col] = Math.random()<0.9 ? 2 : 4;
            newTilePos = { row, col };
            return true;
        }
        function mergeLine(arr) {
            let filtered = arr.filter(v=>v!==0);
            let newArr = [], gain=0;
            for(let i=0;i<filtered.length;i++) {
                if(i+1<filtered.length && filtered[i]===filtered[i+1]) {
                    let merged = filtered[i]*2;
                    newArr.push(merged);
                    gain += merged;
                    i++;
                } else newArr.push(filtered[i]);
            }
            while(newArr.length<SIZE) newArr.push(0);
            return { newCol: newArr, gain };
        }
        function moveAndMerge(direction) {
            if(isGameOverFlag) return false;
            let totalGain = 0, hasMoved = false;
            if(direction===0){
                for(let col=0;col<SIZE;col++){
                    let column = [board[0][col],board[1][col],board[2][col],board[3][col]];
                    let { newCol, gain } = mergeLine(column);
                    totalGain += gain;
                    for(let row=0;row<SIZE;row++) if(board[row][col]!==newCol[row]) hasMoved=true;
                    for(let row=0;row<SIZE;row++) board[row][col]=newCol[row];
                }
            } else if(direction===2){
                for(let col=0;col<SIZE;col++){
                    let column = [board[3][col],board[2][col],board[1][col],board[0][col]];
                    let { newCol, gain } = mergeLine(column);
                    totalGain += gain;
                    let reversed = [...newCol].reverse();
                    for(let row=0;row<SIZE;row++) if(board[row][col]!==reversed[row]) hasMoved=true;
                    for(let row=0;row<SIZE;row++) board[row][col]=reversed[row];
                }
            } else if(direction===1){
                for(let row=0;row<SIZE;row++){
                    let line = [board[row][3],board[row][2],board[row][1],board[row][0]];
                    let { newCol, gain } = mergeLine(line);
                    totalGain += gain;
                    let reversed = [...newCol].reverse();
                    for(let col=0;col<SIZE;col++) if(board[row][col]!==reversed[col]) hasMoved=true;
                    for(let col=0;col<SIZE;col++) board[row][col]=reversed[col];
                }
            } else if(direction===3){
                for(let row=0;row<SIZE;row++){
                    let line = [board[row][0],board[row][1],board[row][2],board[row][3]];
                    let { newCol, gain } = mergeLine(line);
                    totalGain += gain;
                    for(let col=0;col<SIZE;col++) if(board[row][col]!==newCol[col]) hasMoved=true;
                    for(let col=0;col<SIZE;col++) board[row][col]=newCol[col];
                }
            }
            if(hasMoved){
                if(totalGain>0){ currentScore+=totalGain; updateScoreUI(); showScorePop(totalGain); }
                addRandomTile(); renderBoard();
                if(!hasWon && !keepPlayingAfterWin){
                    for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++) if(board[i][j]>=2048){ hasWon=true; showGameOverlay('win'); return true; }
                }
                if(isGameReallyOver()){ isGameOverFlag=true; showGameOverlay('over'); }
                return true;
            }
            return false;
        }
        function isGameReallyOver(){
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++) if(board[i][j]===0) return false;
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++){
                let v=board[i][j];
                if(j+1<SIZE && board[i][j+1]===v) return false;
                if(i+1<SIZE && board[i+1][j]===v) return false;
            }
            return true;
        }
        function showGameOverlay(type){
            if(type==='win'){ overlayMsgSpan.innerText='You win!'; overlayContinueBtn.style.display='inline-block'; }
            else { overlayMsgSpan.innerText='Game over!'; overlayContinueBtn.style.display='none'; }
            gameOverlay.classList.add('show');
        }
        function continueGame(){ keepPlayingAfterWin=true; hasWon=false; gameOverlay.classList.remove('show'); renderBoard(); }
        function resetGame(){
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++) board[i][j]=0;
            currentScore=0; hasWon=false; isGameOverFlag=false; keepPlayingAfterWin=false;
            updateScoreUI(); addRandomTile(); addRandomTile(); gameOverlay.classList.remove('show'); renderBoard();
        }
        function renderBoard(){
            tilesLayer.innerHTML='';
            const rect = gameBoardDiv.getBoundingClientRect();
            const padding = window.innerWidth<=520?8:12;
            const inner = rect.width - padding*2;
            const gap = window.innerWidth<=520?8:12;
            const cellSize = (inner - gap*(SIZE-1))/SIZE;
            for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE;j++){
                let val=board[i][j];
                if(val===0) continue;
                let tile=document.createElement('div');
                tile.className='tile';
                let innerDiv=document.createElement('div');
                innerDiv.className='tile-inner';
                innerDiv.innerText=val;
                tile.appendChild(innerDiv);
                if(val>=2048) tile.classList.add('tile-super');
                else tile.classList.add(`tile-${val}`);
                tile.style.width=`${cellSize}px`; tile.style.height=`${cellSize}px`;
                tile.style.left=`${j*(cellSize+gap)}px`;
                tile.style.top=`${i*(cellSize+gap)}px`;
                if(newTilePos && newTilePos.row===i && newTilePos.col===j) tile.classList.add('tile-new');
                tilesLayer.appendChild(tile);
            }
            newTilePos=null;
        }
        function buildGridBackground(){
            gridBg.innerHTML='';
            const gap = window.innerWidth<=520?8:12;
            for(let i=0;i<SIZE;i++){
                let row=document.createElement('div'); row.className='grid-row'; row.style.gap=`${gap}px`;
                for(let j=0;j<SIZE;j++) row.appendChild(document.createElement('div'));
                gridBg.appendChild(row);
            }
        }
        function onKeyDown(e){
            let dir = {ArrowUp:0, ArrowRight:1, ArrowDown:2, ArrowLeft:3}[e.key];
            if(dir!==undefined){ e.preventDefault(); moveAndMerge(dir); }
        }
        let touchStart=null;
        function onTouchStart(e){ e.preventDefault(); const t=e.touches[0]; touchStart={x:t.clientX, y:t.clientY}; }
        function onTouchEnd(e){
            if(!touchStart) return; e.preventDefault();
            let dx=e.changedTouches[0].clientX-touchStart.x, dy=e.changedTouches[0].clientY-touchStart.y;
            if(Math.abs(dx)<15 && Math.abs(dy)<15) { touchStart=null; return; }
            let dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?1:3) : (dy>0?2:0);
            moveAndMerge(dir);
            touchStart=null;
        }
        window.addEventListener('resize', ()=>{ setTimeout(()=>{ buildGridBackground(); renderBoard(); },100); });
        document.addEventListener('keydown',onKeyDown);
        document.getElementById('gameBoard').addEventListener('touchstart',onTouchStart,{passive:false});
        document.getElementById('gameBoard').addEventListener('touchend',onTouchEnd);
        resetBtn.addEventListener('click',resetGame);
        overlayResetBtn.addEventListener('click',resetGame);
        overlayContinueBtn.addEventListener('click',continueGame);
        loadBest(); buildGridBackground(); initGame();
        function initGame(){ for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE;j++)board[i][j]=0; currentScore=0; hasWon=false; isGameOverFlag=false; keepPlayingAfterWin=false; updateScoreUI(); addRandomTile(); addRandomTile(); renderBoard(); }
    })();

    // 关于本站抽屉控制
    function toggleAboutDrawer() {
        var overlay = document.getElementById('about-drawer-overlay');
        var drawer = document.getElementById('about-drawer');
        if (drawer.classList.contains('show')) {
            drawer.classList.remove('show');
            overlay.style.opacity = '0';
            setTimeout(function() { overlay.classList.remove('show'); }, 300);
        } else {
            overlay.classList.add('show');
            overlay.style.opacity = '1';
            drawer.classList.add('show');
        }
    }
</script>
</body>
</html>
