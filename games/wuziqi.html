<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>五子棋 - 多难度AI对战 | 劳动者游戏</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #2a6b5e 0%, #1d4e45 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #b58d6b;
            background-image: radial-gradient(circle at 20% 30%, rgba(200, 170, 130, 0.3) 1%, transparent 2%);
            border-radius: 48px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            padding: 24px 24px 20px 24px;
            border: 4px solid #8b6b4d;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 215, 140, 0.4);
            cursor: pointer;
            background-color: #e8d5b5; /* 底色，会被canvas绘制覆盖 */
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .turn-indicator {
            background: #2c2e3a;
            padding: 6px 18px;
            border-radius: 60px;
            color: #f0e6c5;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 2px 4px rgba(255,255,200,0.2);
        }

        .turn-indicator span {
            color: #ffd966;
            margin-left: 6px;
        }

        button, .difficulty-btn {
            background: #f5c542;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2d2f36;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #a45d2e;
            font-family: inherit;
        }
        button:active, .difficulty-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a45d2e;
        }
        .difficulty-group {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }
        .difficulty-btn {
            background: #3a3e4a;
            box-shadow: none;
            color: #ddd;
            font-size: 0.8rem;
            padding: 4px 12px;
        }
        .difficulty-btn.active {
            background: #ffb347;
            color: #1e2a2a;
            box-shadow: 0 2px 0 #a45d2e;
        }
        .status {
            background: #1e2a2a;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #f2deb5;
            min-width: 140px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .game-container { padding: 16px; }
            .difficulty-group { order: 2; }
            .turn-indicator, .status, button { font-size: 0.7rem; padding: 4px 12px; }
            .difficulty-btn { font-size: 0.7rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gobangCanvas" width="570" height="570"></canvas>
        <div class="info-panel">
            <div class="turn-indicator">🎴 回合: <span id="turnText">玩家 · 黑棋</span></div>
            <div class="difficulty-group">
                <button data-diff="easy" class="difficulty-btn">简单</button>
                <button data-diff="medium" class="difficulty-btn active">中等</button>
                <button data-diff="hard" class="difficulty-btn">困难</button>
                <button data-diff="master" class="difficulty-btn">大师</button>
            </div>
            <button id="resetBtn">🔄 新游戏</button>
            <div class="status" id="statusMsg">⚫ 黑棋先行</div>
        </div>
    </div>
</div>

<script>
    (function(){
        const boardSize = 15;
        const padding = 28;  // 四周内边距，使边缘交叉点可点击
        let board = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
        let currentTurn = 'black';
        let gameOver = false;
        let winner = null;
        let currentDifficulty = 'medium';
        
        const canvas = document.getElementById('gobangCanvas');
        const ctx = canvas.getContext('2d');
        const turnTextSpan = document.getElementById('turnText');
        const statusDiv = document.getElementById('statusMsg');
        
        const canvasSize = canvas.width;
        const cellSize = (canvasSize - 2 * padding) / (boardSize - 1);
        const pieceRadius = cellSize * 0.43;
        
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        
        // ---------- 评估函数（同原代码）----------
        function evaluateDirection(board, row, col, color) {
            let totalScore = 0;
            for(let d of dirs) {
                let count = 1;
                let openRight = 0, openLeft = 0;
                for(let step = 1; step <= 5; step++) {
                    const nr = row + d[0]*step, nc = col + d[1]*step;
                    if(nr<0 || nr>=boardSize || nc<0 || nc>=boardSize) break;
                    if(board[nr][nc] === color) count++;
                    else if(board[nr][nc] === null) { openRight++; break; }
                    else break;
                }
                for(let step = 1; step <= 5; step++) {
                    const nr = row - d[0]*step, nc = col - d[1]*step;
                    if(nr<0 || nr>=boardSize || nc<0 || nc>=boardSize) break;
                    if(board[nr][nc] === color) count++;
                    else if(board[nr][nc] === null) { openLeft++; break; }
                    else break;
                }
                let score = 0;
                if(count >= 5) score = 100000;
                else if(count === 4) score = (openLeft+openRight >=1) ? 20000 : 3000;
                else if(count === 3) score = (openLeft+openRight >=2) ? 3000 : (openLeft+openRight ===1 ? 400 : 80);
                else if(count === 2) score = (openLeft+openRight >=2) ? 300 : 30;
                else if(count === 1) score = 5;
                totalScore += score;
            }
            return totalScore;
        }
        
        function getAIMove() {
            let bestScore = -1;
            let candidates = [];
            for(let i=0; i<boardSize; i++) {
                for(let j=0; j<boardSize; j++) {
                    if(board[i][j] !== null) continue;
                    let attack = evaluateDirection(board, i, j, 'white');
                    let defend = evaluateDirection(board, i, j, 'black');
                    let total = 0;
                    if(currentDifficulty === 'easy') {
                        total = attack * 0.5 + defend * 0.5 + Math.random() * 25;
                    } else if(currentDifficulty === 'medium') {
                        total = attack * 0.7 + defend * 1.0 + Math.random() * 5;
                    } else if(currentDifficulty === 'hard') {
                        total = attack * 1.2 + defend * 1.2;
                    } else { // master
                        total = attack * 1.5 + defend * 1.5;
                    }
                    if(total > bestScore) {
                        bestScore = total;
                        candidates = [{row:i, col:j}];
                    } else if(Math.abs(total - bestScore) < 0.5) {
                        candidates.push({row:i, col:j});
                    }
                }
            }
            if(candidates.length === 0) return null;
            if(currentDifficulty === 'easy') {
                return candidates[Math.floor(Math.random() * candidates.length)];
            }
            return candidates[0];
        }
        
        function checkWin(row, col, color) {
            for(let d of dirs) {
                let count = 1;
                for(let step=1; step<=5; step++) {
                    const nr = row + d[0]*step, nc = col + d[1]*step;
                    if(nr<0 || nr>=boardSize || nc<0 || nc>=boardSize) break;
                    if(board[nr][nc] === color) count++;
                    else break;
                }
                for(let step=1; step<=5; step++) {
                    const nr = row - d[0]*step, nc = col - d[1]*step;
                    if(nr<0 || nr>=boardSize || nc<0 || nc>=boardSize) break;
                    if(board[nr][nc] === color) count++;
                    else break;
                }
                if(count >= 5) return true;
            }
            return false;
        }
        
        function isDraw() {
            for(let i=0; i<boardSize; i++)
                for(let j=0; j<boardSize; j++)
                    if(board[i][j] === null) return false;
            return true;
        }
        
        function endGame(winnerColor) {
            gameOver = true;
            winner = winnerColor;
            if(winnerColor === 'black') statusDiv.innerHTML = '🏆 玩家获胜！ 🏆';
            else if(winnerColor === 'white') statusDiv.innerHTML = '🤖 AI获胜！ 再来一局吧';
            else statusDiv.innerHTML = '🤝 平局！';
            turnTextSpan.innerText = winnerColor === 'black' ? '玩家胜' : (winnerColor === 'white' ? 'AI胜' : '平局');
            drawBoard();
        }
        
        function placePiece(row, col, color, isAI = false) {
            if(gameOver) return false;
            if(row<0 || row>=boardSize || col<0 || col>=boardSize) return false;
            if(board[row][col] !== null) return false;
            if(currentTurn !== color) return false;
            
            board[row][col] = color;
            drawBoard();
            
            if(checkWin(row, col, color)) {
                endGame(color);
                return true;
            } else if(isDraw()) {
                endGame(null);
                return true;
            }
            currentTurn = (currentTurn === 'black' ? 'white' : 'black');
            updateUI();
            drawBoard();
            
            if(!gameOver && currentTurn === 'white') {
                setTimeout(() => {
                    if(!gameOver && currentTurn === 'white') {
                        const move = getAIMove();
                        if(move) placePiece(move.row, move.col, 'white', true);
                    }
                }, 40);
            }
            return true;
        }
        
        function updateUI() {
            if(gameOver) return;
            if(currentTurn === 'black') {
                turnTextSpan.innerText = '玩家 · 黑棋';
                statusDiv.innerHTML = '🎯 轮到你了';
            } else {
                turnTextSpan.innerText = 'AI · 白棋';
                statusDiv.innerHTML = '🤔 AI 思考中 ...';
            }
        }
        
        function resetGame() {
            board = Array(boardSize).fill().map(() => Array(boardSize).fill(null));
            currentTurn = 'black';
            gameOver = false;
            winner = null;
            updateUI();
            statusDiv.innerHTML = '⚫ 黑棋先行';
            drawBoard();
        }
        
        function setDifficulty(level) {
            currentDifficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                if(btn.getAttribute('data-diff') === level) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            resetGame();
        }
        
        // ---------- 绘图（增加木质背景，所有坐标加上padding）----------
        function drawBoard() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            
            // 1. 绘制木质底色（仿木纹渐变）
            const woodGrad = ctx.createLinearGradient(0, 0, canvasSize, canvasSize);
            woodGrad.addColorStop(0, '#d4b48c');
            woodGrad.addColorStop(0.3, '#c4a07a');
            woodGrad.addColorStop(0.6, '#b58d6b');
            woodGrad.addColorStop(1, '#a0785a');
            ctx.fillStyle = woodGrad;
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            
            // 添加一些木纹线条（简单的深浅条纹）
            ctx.strokeStyle = 'rgba(120, 80, 50, 0.15)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                let y = 20 + i * 28;
                ctx.beginPath();
                ctx.moveTo(0, y + Math.sin(i) * 6);
                ctx.lineTo(canvasSize, y + Math.cos(i*1.3) * 8);
                ctx.stroke();
            }
            
            // 2. 绘制网格线
            ctx.beginPath();
            ctx.strokeStyle = '#2c1e0e';
            ctx.lineWidth = 1.8;
            for(let i=0; i<boardSize; i++) {
                const x = padding + i * cellSize;
                const y = padding + i * cellSize;
                ctx.moveTo(x, padding);
                ctx.lineTo(x, canvasSize - padding);
                ctx.moveTo(padding, y);
                ctx.lineTo(canvasSize - padding, y);
            }
            ctx.stroke();
            
            // 3. 星位标记
            const starPos = [[3,3],[3,11],[11,3],[11,11],[7,7]];
            for(let [r,c] of starPos) {
                const x = padding + c * cellSize;
                const y = padding + r * cellSize;
                ctx.fillStyle = '#4d2f1a';
                ctx.beginPath();
                ctx.arc(x, y, cellSize*0.1, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = '#8b6b4d';
                ctx.beginPath();
                ctx.arc(x, y, cellSize*0.05, 0, 2*Math.PI);
                ctx.fill();
            }
            
            // 4. 绘制棋子
            for(let i=0; i<boardSize; i++) {
                for(let j=0; j<boardSize; j++) {
                    const val = board[i][j];
                    if(!val) continue;
                    const x = padding + j * cellSize;
                    const y = padding + i * cellSize;
                    const grd = ctx.createRadialGradient(x-3, y-3, 5, x, y, pieceRadius);
                    if(val === 'black') {
                        grd.addColorStop(0, '#555');
                        grd.addColorStop(1, '#111');
                        ctx.fillStyle = grd;
                    } else {
                        grd.addColorStop(0, '#fefefe');
                        grd.addColorStop(1, '#c0c0c0');
                        ctx.fillStyle = grd;
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, pieceRadius-1, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = '#777';
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }
            }
            
            // 5. 胜利信息
            if(gameOver && winner) {
                ctx.font = `bold ${Math.floor(cellSize*0.8)}px "Segoe UI"`;
                ctx.fillStyle = winner === 'black' ? '#1e2a2a' : '#d4c9a6';
                ctx.shadowBlur = 4;
                ctx.fillText(winner === 'black' ? '⚫ 玩家胜利' : '⚪ AI胜利', canvasSize/2-70, 55);
                ctx.shadowBlur = 0;
            } else if(gameOver && !winner) {
                ctx.font = `bold 20px system-ui`;
                ctx.fillStyle = '#5a3e2a';
                ctx.fillText('平局', canvasSize/2-25, 50);
            }
        }
        
        // 交互 – 根据鼠标位置找到最近的交叉点（考虑padding）
        function getNearestIntersection(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasSize / rect.width;
            const scaleY = canvasSize / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            // 相对于padding偏移
            let rowFloat = (canvasY - padding) / cellSize;
            let colFloat = (canvasX - padding) / cellSize;
            let row = Math.round(rowFloat);
            let col = Math.round(colFloat);
            if(row < 0 || row >= boardSize || col < 0 || col >= boardSize) return null;
            return {row, col};
        }
        
        function onCanvasClick(e) {
            if(gameOver) return;
            if(currentTurn !== 'black') return;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const pos = getNearestIntersection(clientX, clientY);
            if(pos && board[pos.row][pos.col] === null) {
                placePiece(pos.row, pos.col, 'black');
            }
        }
        
        canvas.addEventListener('mousedown', onCanvasClick);
        canvas.addEventListener('touchstart', onCanvasClick);
        document.getElementById('resetBtn').addEventListener('click', () => resetGame());
        
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const diff = btn.getAttribute('data-diff');
                setDifficulty(diff);
            });
        });
        
        resetGame();
    })();
</script>
</body>
</html>
